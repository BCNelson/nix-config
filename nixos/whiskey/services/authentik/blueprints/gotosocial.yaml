version: 1
metadata:
  name: gotosocial
entries:
  # OAuth2 / OIDC provider
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-gotosocial
    identifiers:
      name: gotosocial
    attrs:
      name: gotosocial
      client_type: confidential
      client_id: gotosocial
      # Injected from the systemd EnvironmentFile (see authentik.nix).
      client_secret: !Env GOTOSOCIAL_OAUTH_CLIENT_SECRET
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      # kanidm preferShortUsername -> use the username as the OIDC subject.
      sub_mode: user_username
      # RSA self-signed cert => RS256 ID tokens (default cert).
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      redirect_uris:
        - matching_mode: strict
          url: https://social.nel.family/auth/callback
      # groups are delivered via the default "profile" scope claim.
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

  # Application (dashboard tile + access policy target)
  - model: authentik_core.application
    id: app-gotosocial
    identifiers:
      slug: gotosocial
    attrs:
      name: GoToSocial
      slug: gotosocial
      provider: !KeyOf provider-gotosocial
      meta_launch_url: https://social.nel.family/
      policy_engine_mode: any

  # Access restricted to household + extended_family (kanidm scopeMaps keys)
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-gotosocial
      group: !Find [authentik_core.group, [name, household]]
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-gotosocial
      group: !Find [authentik_core.group, [name, extended_family]]
      order: 1
    attrs:
      enabled: true
