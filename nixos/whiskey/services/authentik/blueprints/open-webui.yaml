version: 1
metadata:
  name: open-webui
entries:
  # OAuth2 / OIDC provider
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-open-webui
    identifiers:
      name: open-webui
    attrs:
      name: open-webui
      client_type: confidential
      client_id: open-webui
      # Authentik 2026.x requires grant_types to be set explicitly; the model
      # default is an empty list, which rejects the auth-code flow with
      # "Invalid grant_type for provider" -> "request is otherwise malformed".
      grant_types:
        - authorization_code
        - refresh_token
      # Injected from the systemd EnvironmentFile (see authentik.nix).
      client_secret: !Env OPEN_WEBUI_OAUTH_CLIENT_SECRET
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      # kanidm preferShortUsername -> use the username as the OIDC subject.
      sub_mode: user_username
      # RSA self-signed cert => RS256 ID tokens (default cert).
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      redirect_uris:
        - matching_mode: strict
          url: https://ai.h.b.nel.family/oauth/oidc/callback
      # groups are delivered via the default "profile" scope claim, which
      # Open-WebUI reads from the "groups" claim (OAUTH_GROUPS_CLAIM default).
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

  # Application (dashboard tile + access policy target)
  - model: authentik_core.application
    id: app-open-webui
    identifiers:
      slug: open-webui
    attrs:
      name: Family AI
      slug: open-webui
      provider: !KeyOf provider-open-webui
      meta_launch_url: https://ai.h.b.nel.family/
      policy_engine_mode: any

  # Access restricted to household + extended_family (kanidm scopeMaps keys)
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-open-webui
      group: !Find [authentik_core.group, [name, household]]
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-open-webui
      group: !Find [authentik_core.group, [name, extended_family]]
      order: 1
    attrs:
      enabled: true
